name: Alsayegh Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        # هذا هو الرابط الصحيح والمؤكد
        uses: ArtemShatriy/buildozer-action@v1.6.1
        with:
          workdir: .
          buildozer_version: stable
